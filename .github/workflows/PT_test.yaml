name: PT Test Master Pipeline (Current → Major → Minor)

on:
  pull_request:
    branches:
      - Test
  workflow_dispatch:

jobs:

 automated-tests:
  name: Run Automated Tests
  uses: microsoft/AL-Go-Actions/.github/workflows/Test.yml@v8.3
  with:
    environmentName: PT_SBOX
  secrets: inherit


 run-current:
    name: Run Build Current
    needs: automated-tests
    uses: ./.github/workflows/Current.yaml

 run-major:
    name: Run Build Next Major
    needs: run-current
    uses: ./.github/workflows/NextMajor.yaml

 run-minor:
    name: Run Build Next Minor
    needs: run-major
    uses: ./.github/workflows/NextMinor.yaml

 publish-to-environment:
    name: Publish to SaaS Environment
    needs: run-minor
    uses: ./.github/workflows/PublishToEnvironment.yaml
    with:
      environmentName: PT_SBOX
      appVersion: current


